<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Requested — BracciaCap AI</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, #1b2a4a 0%, #2d4a7a 40%, #8aaccf 70%, #c8d8e8 100%);
            color: #fff; text-align: center; padding: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 24px;
            padding: 3rem 2.5rem; max-width: 480px;
        }
        h1 { font-size: 2rem; font-weight: 900; margin-bottom: 0.8rem; letter-spacing: -0.04em; }
        p { color: rgba(255,255,255,0.7); font-size: 1rem; line-height: 1.6; margin-bottom: 1.5rem; }
        a {
            display: inline-block; padding: 0.85rem 2rem; background: #fff; color: #1a1a1a;
            text-decoration: none; border-radius: 6px; font-weight: 700; font-size: 0.9rem;
            transition: transform 0.2s;
        }
        a:hover { transform: translateY(-1px); }
        .check { font-size: 3rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">&#10003;</div>
        <h1>Demo request received.</h1>
        <p>Thanks for your interest in BracciaCap AI. A member of our team will reach out within one business day to schedule your personalized demo.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
