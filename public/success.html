<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Demo Requested — BracciaCap AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #0ea5e9 50%, #38bdf8 100%);
      color: #f8fafc;
      padding: 1.5rem;
    }
    .card {
      max-width: 520px;
      width: 100%;
      text-align: center;
      padding: 3rem 2.5rem;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 1.25rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .checkmark {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: rgba(56, 189, 248, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.3;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #cbd5e1;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #0ea5e9;
      color: #fff;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    a:hover { background: #0284c7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="checkmark">&#10003;</div>
    <h1>Demo request received.</h1>
    <p>Thanks for your interest in BracciaCap AI. A member of our team will reach out within one business day to schedule your personalized demo.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
